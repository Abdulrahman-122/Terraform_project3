name: Terraform development Pipeline
permissions:
  contents: read
  # "The workflow can read the repository contents, but it cannot modify the repository, create releases, push commits, etc."
on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main
  release:
    types:
      - published
      

jobs:
  terraform_development:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: development

    steps:
    - name: Checkout Repo in order to  make github work on our project
      uses: actions/checkout@v4

    - name: setup Terraform in order to work on the project.
      uses: hashicorp/setup-terraform@v3
    - name: configure Aws credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY}}
        aws-region: eu-west-3
    - name: terraform format
      run: |
        terraform  fmt -recursive
    - name: verify aws provider
      run: aws sts get-caller-identity
    - name: terraform initialize
      run: terraform init
    - name: terraform  validate
      run: terraform validate
    - name: terraform plan
      if: ${{ github.event_name == 'pull_request' }}
      run: terraform  plan  
    - name: Terraform Apply
      if: ${{ github.event_name == 'push' }}
      run:  terraform  apply  -auto-approve
    - name: wait for 60 s
      if: ${{ github.event_name == 'push' }}
      run: sleep 60
    - name: install jq
      if: ${{ github.event_name == 'push' }}
      run: |
       sudo apt update  -y 
       sudo apt-get install -y  jq
    - name: Health check
      if: ${{ github.event_name == 'push' }}
      run: |
        for ip in $(terraform  output -json public_ip|jq -r  '.[]');do 
            echo "Checking http://$ip" 
            if curl -f --silent http://$ip > /dev/null; then 
               echo "Health Check Passed!" 
            else 
               echo "Health Check Failed!" 
            fi 
        done

    - name: Destroy Terraform
      if: ${{ github.event_name == 'push' }}
      run: terraform destroy --auto-approve

  terraform_production:
    runs-on: ubuntu-latest
    needs:
      - terraform_development

    defaults:
        run:
          working-directory: development
        # for  now i  will  use development as i  make it  nice and added some  feature there otherwise production
    steps:
        - name: Checkout Repo in order to  make github work on our project
          uses: actions/checkout@v4

        - name: setup Terraform in order to work on the project.
          uses: hashicorp/setup-terraform@v3
        - name: configure Aws credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY}}
            aws-region: eu-west-3
        - name: terraform format
          run: |
                terraform  fmt -recursive
        - name: terraform initialize
          run: terraform init
        - name: terraform validate
          run: terraform validate

        - name:  Check pull request
          if: ${{ github.event_name == 'release' }}
          run: |
            terraform  init
            terraform validate
            terraform  apply --auto-approve